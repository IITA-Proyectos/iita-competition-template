name: Translate docs (ES -> EN)

on:
  push:
    branches: [ "main" ]
    paths:
      - "docs/es/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install translator
        run: |
          python -m pip install --upgrade pip
          pip install markdown-translate-ai

      - name: Translate changed files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -e
          CHANGED=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- 'docs/es' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changes in docs/es"
            exit 0
          fi

          for f in $CHANGED; do
            case "$f" in
              *.md|*.mdx) ;;
              *) continue;;
            esac

            out="${f/docs\/es/docs\/en}"
            mkdir -p "$(dirname "$out")"

            if git cat-file -e "$BEFORE_SHA:$f" 2>/dev/null; then
              tmp_prev="$(mktemp)"
              git show "$BEFORE_SHA:$f" > "$tmp_prev"
              markdown-translate-ai "$f" "$out" "English" --source-lang "Spanish" --model "gpt-4o-mini" --update-mode --previous-source "$tmp_prev"
              rm -f "$tmp_prev"
            else
              markdown-translate-ai "$f" "$out" "English" --source-lang "Spanish" --model "gpt-4o-mini"
            fi
          done

      - name: Create PR with translations
        uses: peter-evans/create-pull-request@v8
        with:
          branch: "iita/auto-translate-en"
          delete-branch: true
          title: "chore(docs): auto-translate ES -> EN"
          body: |
            PR generado automáticamente por GitHub Actions.
            - Fuente: docs/es/**
            - Salida: docs/en/**
            Revisar estilo/terminología si el repo está en nivel L2.
          add-paths: |
            docs/en/**
          labels: |
            documentation
            ai/used
          draft: true
