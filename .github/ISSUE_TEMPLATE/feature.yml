name: Feature request
description: Proponer una mejora o nueva funcionalidad
title: "[FEATURE] "
labels: ["type/feature", "status/needs-triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Objetivo
      description: ¿Qué queremos lograr?
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsistema
      options:
        - teensy/firmware
        - raspberrypi/software
        - vision
        - control
        - electronics
        - mechanics
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de aceptación (Definition of Done)
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notas / ideas / referencias
      description: Links a reglas, datasheets, papers, etc.
    validations:
      required: false

  - type: checkboxes
    id: ai
    attributes:
      label: IA / fuentes
      options:
        - label: Si se usa IA o fuentes externas, se incluirán referencias.
          required: false
